<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Changelog — MONSKILLS</title>
<meta name="description" content="Release notes and changes for monskills.">
<meta property="og:title" content="Changelog — MONSKILLS">
<meta property="og:description" content="Release notes and changes for monskills.">
<meta property="og:url" content="https://skills.devnads.com/changelog">
<meta property="og:type" content="website">
<meta property="og:image" content="https://skills.devnads.com/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://skills.devnads.com/og.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="shared.css">
<style>
:root {
  --bg: #0E091C;
  --fg: #c8d0e8;
  --dim: #8490b0;
  --accent: #8B75FF;
  --accent-soft: #c4b5ff;
  --border: #2d2245;
  --hover: #150e28;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { min-height: 100%; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
  font-size: 14px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header bar */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 1.5rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.back-link {
  color: var(--dim);
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  transition: color 0.15s;
}
.back-link:hover { color: var(--fg); text-decoration: none; }
.back-link svg { width: 14px; height: 14px; }
.repo-link {
  color: var(--dim);
  font-size: 13px;
  transition: color 0.15s;
}
.repo-link:hover { color: var(--fg); text-decoration: none; }

/* Page container */
.page {
  flex: 1;
  width: 100%;
  max-width: 820px;
  margin: 0 auto;
  padding: 4rem 1.5rem 4rem;
}

/* Hero */
.hero {
  text-align: center;
  margin-bottom: 4rem;
}
.hero-title {
  font-size: clamp(64px, 12vw, 140px);
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 0.95;
  background: linear-gradient(110deg, var(--accent) 40%, var(--accent-soft) 50%, var(--accent) 60%);
  background-size: 300% 100%;
  background-position: 100% 0;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  text-transform: uppercase;
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
}
.hero-sub {
  color: var(--dim);
  font-size: 13px;
  margin-top: 1rem;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Timeline */
.timeline {
  position: relative;
  padding-left: 2.5rem;
  --line-x: 1rem; /* shared anchor for both line and dots */
}
.timeline::before {
  content: '';
  position: absolute;
  top: 0.5rem;
  bottom: 0.5rem;
  left: var(--line-x);
  width: 2px;
  margin-left: -1px; /* center the 2px line on --line-x */
  background: linear-gradient(to bottom, var(--accent) 0%, var(--border) 30%, var(--border) 100%);
}

.entry {
  position: relative;
  padding-bottom: 3rem;
}
.entry:last-child { padding-bottom: 0; }
.entry::before {
  content: '';
  position: absolute;
  top: 10px;
  /* entry sits at padding-left of timeline (2.5rem), so to anchor at --line-x (1rem)
     in timeline coords, the dot center sits at -1.5rem in entry coords */
  left: calc(var(--line-x) - 2.5rem);
  width: 16px;
  height: 16px;
  margin-left: -8px; /* center the 16px dot on the line */
  border-radius: 50%;
  background: var(--bg);
  border: 2px solid var(--border);
  box-sizing: border-box;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.entry.latest::before {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(139, 117, 255, 0.15);
}

.entry-head {
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-bottom: 0.75rem;
}
.entry-version {
  font-size: 20px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -0.01em;
}
.entry-version a { color: inherit; }
.entry-version a:hover { text-decoration: none; opacity: 0.85; }
.entry-date {
  color: var(--dim);
  font-size: 12px;
  letter-spacing: 0.5px;
}
.entry-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 0.15rem 0.5rem;
  border-radius: 3px;
  background: rgba(139, 117, 255, 0.12);
  color: var(--accent);
  border: 1px solid rgba(139, 117, 255, 0.3);
}
.entry-badge.pre {
  background: rgba(212, 96, 95, 0.12);
  color: #d4605f;
  border-color: rgba(212, 96, 95, 0.35);
}

.entry-body {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1.25rem 1.5rem;
  background: rgba(21, 14, 40, 0.4);
  transition: border-color 0.2s;
}
.entry.latest .entry-body { border-color: rgba(139, 117, 255, 0.35); }

.entry-body h1, .entry-body h2, .entry-body h3 {
  color: var(--accent);
  margin: 1.1em 0 0.5em;
  font-weight: 600;
}
.entry-body h1 { font-size: 1.2em; }
.entry-body h2 { font-size: 1.08em; }
.entry-body h3 { font-size: 1em; }
.entry-body > *:first-child { margin-top: 0; }
.entry-body > *:last-child { margin-bottom: 0; }
.entry-body p { margin: 0.65em 0; }
.entry-body ul, .entry-body ol { margin: 0.65em 0; padding-left: 1.5em; }
.entry-body li { margin: 0.3em 0; }
.entry-body code {
  background: var(--hover);
  color: var(--accent);
  padding: 0.1em 0.4em;
  border-radius: 3px;
  font-size: 0.92em;
}
.entry-body pre {
  background: var(--hover);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 0.75rem 1rem;
  overflow-x: auto;
  margin: 0.75em 0;
}
.entry-body pre code { background: none; padding: 0; color: var(--fg); }
.entry-body strong { color: var(--fg); font-weight: 600; }
.entry-body a { color: var(--accent); }
.entry-body blockquote {
  border-left: 3px solid var(--accent);
  margin: 0.75em 0;
  padding-left: 1em;
  color: var(--dim);
}

.empty-body {
  color: var(--dim);
  font-style: italic;
  font-size: 13px;
}

.state {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--dim);
}
.state.error { color: #d4605f; }
.state a { color: var(--accent); }

.footer {
  text-align: center;
  color: var(--dim);
  font-size: 11px;
  padding: 1.25rem 1.5rem;
  border-top: 1px solid var(--border);
}

/* Mobile */
@media (max-width: 600px) {
  .page { padding: 2.5rem 1rem 2.5rem; }
  .hero { margin-bottom: 2.5rem; }
  .timeline { padding-left: 1.75rem; --line-x: 0.625rem; }
  .entry::before { width: 12px; height: 12px; margin-left: -6px; top: 8px; }
  .entry-body { padding: 1rem 1.1rem; }
}
</style>
</head>
<body>

<header class="header">
  <a href="/" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>
  <a class="repo-link" href="https://github.com/therealharpaljadeja/monskills/releases" target="_blank" rel="noopener">Releases on GitHub ↗</a>
</header>

<main class="page">
  <section class="hero">
    <h1 class="hero-title" id="hero-title">Changelog</h1>
    <div class="hero-sub">What shipped, when</div>
  </section>

  <section id="timeline" class="timeline" aria-live="polite">
    <div class="state" id="loading">Loading releases…</div>
  </section>
</main>

<footer class="footer">
  MIT License · <a href="/" >skills.devnads.com</a>
</footer>

<script>
const REPO = 'therealharpaljadeja/monskills';
const API = 'https://api.github.com/repos/' + REPO + '/releases?per_page=50';
const timelineEl = document.getElementById('timeline');

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMarkdown(md) {
  if (!md || !md.trim()) return '';
  const esc = escHtml;
  const inline = s => esc(s)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[\s(])\*(?!\s)([^*\n]+?)\*(?=[\s).,!?:;]|$)/g, '$1<em>$2</em>')
    .replace(/`([^`\n]+)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => {
      const safeUrl = /^https?:\/\//.test(url) || url.startsWith('/') || url.startsWith('#') ? url : '#';
      return '<a href="' + safeUrl + '" target="_blank" rel="noopener">' + text + '</a>';
    });
  // Normalize: convert CRLF, then strip trailing whitespace from each line.
  // GitHub release bodies often have huge trailing-whitespace runs that don't
  // affect rendering but make the source noisy. Leading whitespace is preserved
  // only inside fenced code blocks.
  let raw = md.replace(/\r\n?/g, '\n');
  const lines = raw.split('\n').map(l => l.replace(/\s+$/, ''));
  let out = '';
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (/^\s*```(\w*)\s*$/.test(line)) {
      let block = '';
      for (i++; i < lines.length && !/^\s*```\s*$/.test(lines[i]); i++) block += esc(lines[i]) + '\n';
      i++;
      out += '<pre><code>' + block + '</code></pre>';
      continue;
    }
    if (/^\s*(#{1,3})\s+(.+?)\s*#*$/.test(line)) {
      const l = RegExp.$1.length;
      out += '<h' + l + '>' + inline(RegExp.$2) + '</h' + l + '>';
      i++;
      continue;
    }
    if (/^\s*>\s?(.*)$/.test(line)) {
      let block = inline(RegExp.$1);
      for (i++; i < lines.length && /^\s*>\s?(.*)$/.test(lines[i]); i++) block += '\n' + inline(RegExp.$1);
      out += '<blockquote>' + block.replace(/\n/g, '<br>') + '</blockquote>';
      continue;
    }
    if (/^\s*[-*]\s+(.+)$/.test(line)) {
      out += '<ul>';
      while (i < lines.length && /^\s*[-*]\s+(.+)$/.test(lines[i])) {
        out += '<li>' + inline(RegExp.$1) + '</li>';
        i++;
      }
      out += '</ul>';
      continue;
    }
    if (/^\s*\d+\.\s+(.+)$/.test(line)) {
      out += '<ol>';
      while (i < lines.length && /^\s*\d+\.\s+(.+)$/.test(lines[i])) {
        out += '<li>' + inline(RegExp.$1) + '</li>';
        i++;
      }
      out += '</ol>';
      continue;
    }
    if (line.trim() === '') { i++; continue; }
    // Coalesce consecutive non-empty lines into one paragraph (join with space).
    let para = line.trim();
    for (i++; i < lines.length && lines[i].trim() !== '' && !/^\s*(#{1,3}\s|>|[-*]\s|\d+\.\s|```)/.test(lines[i]); i++) {
      para += ' ' + lines[i].trim();
    }
    out += '<p>' + inline(para) + '</p>';
  }
  return out;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
}

function renderReleases(releases) {
  if (!releases.length) {
    timelineEl.innerHTML = '<div class="state">No releases published yet.</div>';
    return;
  }
  const items = releases.map((r, idx) => {
    const title = r.name && r.name.trim() ? r.name : r.tag_name;
    const date = formatDate(r.published_at || r.created_at);
    const body = renderMarkdown(r.body || '') || '<p class="empty-body">No release notes.</p>';
    const badge = r.prerelease
      ? '<span class="entry-badge pre">Pre-release</span>'
      : (idx === 0 ? '<span class="entry-badge">Latest</span>' : '');
    return (
      '<article class="entry' + (idx === 0 ? ' latest' : '') + '">' +
        '<div class="entry-head">' +
          '<h2 class="entry-version"><a href="' + escHtml(r.html_url) + '" target="_blank" rel="noopener">' + escHtml(title) + '</a></h2>' +
          (date ? '<span class="entry-date">' + escHtml(date) + '</span>' : '') +
          badge +
        '</div>' +
        '<div class="entry-body">' + body + '</div>' +
      '</article>'
    );
  }).join('');
  timelineEl.innerHTML = items;

  document.querySelectorAll('.entry').forEach((entry, index) => {
    entry.style.opacity = '0';
    entry.style.transform = 'translateY(16px)';
    entry.style.transition = 'opacity 450ms ease, transform 450ms ease';
    window.setTimeout(() => {
      entry.style.opacity = '1';
      entry.style.transform = 'translateY(0)';
    }, index * 70);
  });
}

function renderError(message) {
  timelineEl.innerHTML =
    '<div class="state error">' +
      'Could not load releases: ' + escHtml(message) + '<br>' +
      '<a href="https://github.com/' + REPO + '/releases" target="_blank" rel="noopener">View on GitHub ↗</a>' +
    '</div>';
}

fetch(API, { headers: { 'Accept': 'application/vnd.github+json' } })
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(data => {
    const releases = (data || []).filter(r => !r.draft);
    releases.sort((a, b) => new Date(b.published_at || b.created_at) - new Date(a.published_at || a.created_at));
    renderReleases(releases);
  })
  .catch(err => renderError(err.message || 'Unknown error'));

// Looping shine on the hero title
document.getElementById('hero-title').animate(
  [{ backgroundPosition: '100% 0' }, { backgroundPosition: '0% 0' }],
  { duration: 2500, easing: 'ease-in-out', iterations: Infinity, delay: 3000 }
);
</script>
</body>
</html>
